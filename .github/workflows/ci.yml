name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pii-scan:
    name: PII Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scan src/ for PII
        run: node scripts/detect-pii.js src/
      - name: Scan prompts/ for PII
        run: node scripts/detect-pii.js prompts/

  test:
    name: Tests (mock LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run regression tests
        run: node tests/run-all.js
        env:
          LLM_PROVIDER: mock
          NODE_ENV: test
          CI: true
          AVIV_PHONE: "10000000000"
          LIAT_PHONE: "10000000001"
          MASTER_GROUP_NAME: "Test Family Group"
          MASTER_GROUP_JID: "000000000000000000@g.us"
          AVIV_CALENDAR_ID: "test-parent1@example.com"
          LIAT_CALENDAR_ID: "test-parent2@example.com"
          TIMEZONE: "UTC"
          ANTHROPIC_API_KEY: "sk-ant-test-not-real"
